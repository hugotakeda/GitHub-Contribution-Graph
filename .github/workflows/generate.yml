name: Generate Energy Rhythm SVG

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allow manual run from GitHub UI
  schedule:
    - cron: "0 0,12 * * *" # Executa a cada 12 horas

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Generate SVG
        run: node scripts/generateSvg.js
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GRAPH_TOKEN }}
          TIMEZONE: ${{ vars.TIMEZONE || 'UTC' }}

      - name: Commit & push SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update energy rhythm graph [skip ci]"
          file_pattern: dist/energy-rhythm.svg
